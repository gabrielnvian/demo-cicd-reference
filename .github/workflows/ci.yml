name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hello-app

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    # Only build and push on tag releases
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write   # for OIDC
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF##refs/tags/}"
          else
            TAG="sha-${SHORT_SHA}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.meta.outputs.image_tag }} \
            -t ${{ steps.meta.outputs.image_uri }} \
            .
          docker push ${{ steps.meta.outputs.image_uri }}
